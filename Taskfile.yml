version: "3"

# ---------------------------------------------------------------------------
# hexcap — Rust TUI packet capture with libpcap + hexyl hex dump
# ---------------------------------------------------------------------------

tasks:
  # --- Quality Gates ---
  check:all:
    desc: "Run all quality gates (format, lint, test)"
    deps: [format, lint, test]
    cmds:
      - echo "All checks passed!"

  format:
    desc: "Check formatting"
    cmds:
      - cargo fmt --all -- --check

  fmt:
    desc: "Format all Rust code (write mode)"
    cmds:
      - cargo fmt --all

  lint:
    desc: "Run clippy on all targets"
    cmds:
      - cargo clippy --all-targets -- -D warnings

  test:
    desc: "Run all tests"
    cmds:
      - cargo test

  # --- Build ---
  build:
    desc: "Build (debug)"
    cmds:
      - cargo build

  build:release:
    desc: "Build optimized release binary"
    deps: [check:all]
    cmds:
      - cargo build --release

  # --- Run ---
  run:
    desc: "Build release and run hexcap"
    deps: [build:release]
    cmds:
      - sudo ./target/release/hexcap

  run:dev:
    desc: "Build debug and run hexcap"
    deps: [build]
    cmds:
      - sudo ./target/debug/hexcap

  # --- Install ---
  install:
    desc: "Build release and install to ~/.cargo/bin"
    cmds:
      - cargo install --path . --locked

  # --- Utilities ---
  loc:
    desc: "Show lines of code statistics"
    cmds:
      - tokei

  clean:
    desc: "Remove build artifacts"
    cmds:
      - cargo clean

  # --- Version Management (scripts/version.sh is the source of truth) ---
  version:show:
    desc: "Print the current version"
    cmds:
      - ./scripts/version.sh show

  version:patch:
    desc: "Bump patch version and sync Cargo.toml"
    cmds:
      - ./scripts/version.sh patch

  version:minor:
    desc: "Bump minor version and sync Cargo.toml"
    cmds:
      - ./scripts/version.sh minor

  version:major:
    desc: "Bump major version and sync Cargo.toml"
    cmds:
      - ./scripts/version.sh major

  version:sync:
    desc: "Re-sync Cargo.toml to VERSION file"
    cmds:
      - ./scripts/version.sh sync

  version:tag:
    desc: "Create a git tag from the current VERSION file"
    cmds:
      - ./scripts/version.sh tag

  # --- Release ---
  release:
    desc: "Bump patch, commit, tag, and push"
    cmds:
      - ./scripts/version.sh release
